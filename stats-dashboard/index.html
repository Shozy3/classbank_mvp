<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClassBank - Stats Dashboard</title>
  <link rel="stylesheet" href="../practice-session/css/tokens.css">
  <link rel="stylesheet" href="../practice-session/css/reset.css">
  <link rel="stylesheet" href="../practice-session/css/layout.css">
  <link rel="stylesheet" href="css/stats-dashboard.css">
</head>
<body data-nav-active="stats-dashboard">
  <div id="app-shell">
    <nav id="app-nav" aria-label="Main navigation"></nav>

    <main id="session-root" aria-label="Stats dashboard">
      <header id="stats-header">
        <div>
          <div class="header-kicker">ClassBank</div>
          <h1>Stats Dashboard</h1>
        </div>
        <p id="stats-subtitle">Lightweight progress context to support your next study action.</p>
      </header>

      <section id="stats-body">
        <div id="stats-primary" class="card card-streak"></div>
        <div id="stats-secondary" class="card-grid"></div>
      </section>
    </main>
  </div>

  <script src="../shared/js/app-shell.js"></script>
  <script type="module" src="js/stats-dashboard.js"></script>
</body>
</html>
